name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  schedule:
    # Run tests daily at 2 AM UTC to catch flaky tests
    - cron: '0 2 * * *'

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        java-version: [ '17' ]
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: warehouse_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'
          cache: maven

      - name: Build project
        run: ./mvnw clean compile -DskipTests

      - name: Run all unit tests
        run: ./mvnw clean test
        continue-on-error: false

      - name: Run integration and concurrency tests
        run: ./mvnw test -Dtest=WarehouseConcurrencyIT,WarehouseTestcontainersIT
        continue-on-error: false

      - name: Run archive use case validation tests
        run: ./mvnw test -Dtest=ArchiveWarehouseUseCaseTest
        continue-on-error: false

      - name: Run optimistic locking validation test
        run: ./mvnw test -Dtest=ArchiveWarehouseUseCaseTest#testConcurrentArchiveAndStockUpdateCausesOptimisticLockException
        continue-on-error: false

      - name: Generate test coverage report
        run: ./mvnw jacoco:report
        continue-on-error: true

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-reports
          path: target/surefire-reports/

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: coverage-reports
          path: target/site/jacoco/
          
      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: target/surefire-reports/TEST-*.xml
          check_name: Test Results
          comment_mode: always

  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java-version: [ '17' ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'
          cache: maven

      - name: Build with all checks
        run: ./mvnw clean verify -DskipTests

      - name: Check for compilation errors
        run: ./mvnw compile

  dependency-check:
    name: Dependency Security Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run dependency check
        run: ./mvnw dependency:check
        continue-on-error: true
