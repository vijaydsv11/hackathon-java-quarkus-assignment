name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Make mvnw executable
        run: chmod +x ./mvnw

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build and Run Tests
        run: ./mvnw clean verify

      - name: Generate Coverage
        run: ./mvnw jacoco:report

      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports

      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: target/site/jacoco
          
      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: target/surefire-reports/TEST-*.xml
          check_name: Test Results
          comment_mode: always
        continue-on-error: true

  deploy-coverage:
    name: Deploy Coverage Report
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage-report

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./coverage-report
          force_orphan: true 

  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java-version: [ '17' ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Make mvnw executable
        run: chmod +x ./mvnw

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'
          cache: maven

      - name: Check for compilation errors
        run: ./mvnw compile

  dependency-check:
    name: Dependency Security Check
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Make mvnw executable
        run: chmod +x ./mvnw

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run dependency check
        run: ./mvnw org.owasp:dependency-check-maven:check -DskipTests || true
        continue-on-error: true

  advanced-tests:
    name: Advanced Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Make mvnw executable
        run: chmod +x ./mvnw

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Integration & Concurrency Tests
        run: ./mvnw test -Dtest=WarehouseConcurrencyIT,WarehouseTestcontainersIT
        continue-on-error: true

      - name: Archive Use Case Tests
        run: ./mvnw test -Dtest=ArchiveWarehouseUseCaseTest
        continue-on-error: true

      - name: Optimistic Locking Validation
        run: ./mvnw test -Dtest=ArchiveWarehouseUseCaseTest#testConcurrentArchiveAndStockUpdateCausesOptimisticLockException
        continue-on-error: true

      - name: Upload Advanced Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: advanced-test-reports
          path: target/surefire-reports
        continue-on-error: true
