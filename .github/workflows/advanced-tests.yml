name: Advanced Testing & Validation

on:
  push:
    branches: [ main, master, develop ]
    paths:
      - 'src/**'
      - 'pom.xml'
      - '.github/workflows/advanced-tests.yml'
  pull_request:
    branches: [ main, master, develop ]
    paths:
      - 'src/**'
      - 'pom.xml'

jobs:
  concurrency-tests:
    name: Concurrency & Stress Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: warehouse_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run concurrent warehouse operations tests
        run: ./mvnw test -Dtest=WarehouseConcurrencyIT
        continue-on-error: false

      - name: Run testcontainers integration tests
        run: ./mvnw test -Dtest=WarehouseTestcontainersIT
        continue-on-error: false

      - name: Run warehouse validation tests
        run: ./mvnw test -Dtest=WarehouseValidationTest
        continue-on-error: false

      - name: Run optimistic locking tests
        run: ./mvnw test -Dtest=WarehouseOptimisticLockingTest
        continue-on-error: false

      - name: Upload concurrency test reports
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: concurrency-test-reports
          path: target/surefire-reports/

  mutation-testing:
    name: Mutation Testing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run PIT mutation testing
        run: ./mvnw org.pitest:pitest-maven:mutationCoverage -DskipTests=false -Dsonar.skip=true
        continue-on-error: true

      - name: Upload mutation test report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: mutation-test-report
          path: target/pit-reports/

  property-based-testing:
    name: Property-Based Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run property-based tests (if configured)
        run: ./mvnw test -Dtest=**/*PropertyTest
        continue-on-error: true
